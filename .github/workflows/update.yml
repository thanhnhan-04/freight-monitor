name: Update freight drivers (EIA)

on:
  schedule:
    # 00:00 UTC = 07:00 giờ Việt Nam, các ngày thứ 2–6.
    - cron: "0 0 * * 1-5"
  workflow_dispatch: {}   # cho phép bấm chạy tay trong tab Actions

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Lay du lieu EIA
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: python fetch_data.py

      - name: Commit & push neu co thay doi
        run: |
          git config user.name "freight-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "Khong co thay doi, bo qua."
            exit 0
          fi
          git commit -m "auto: cap nhat du lieu $(date -u +%F)"
          # Dong bo voi remote truoc khi push (tranh loi 'fetch first'); uu tien ban data.json moi
          git pull --rebase --autostash -X theirs origin "${GITHUB_REF_NAME}" || true
          git push origin "HEAD:${GITHUB_REF_NAME}"
