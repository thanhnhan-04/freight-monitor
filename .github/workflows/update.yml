name: Update freight drivers (EIA)

on:
  schedule:
    - cron: "0 0 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Lay du lieu EIA
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: python fetch_data.py
      - name: Commit & push neu co thay doi
        run: |
          git config user.name "freight-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "auto: cap nhat du lieu $(date -u +%F)"
          git push
